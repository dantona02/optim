####################################################################################
# T2-Fitting — mit chemischem Austausch (k = 2000 Hz, schnell-austauschender Pool) #
# Repräsentativ für Hydroxyl-/Amin-Gruppen (Glykosaminoglykane, mobile Proteine)  #
# b0_inhom: 3e-8 → T2* ≈ 10 ms (geeignet für Echo-Extraktion)                    #
#                                                                                   #
# Rex = k·f·Δω²/(Δω²+(2πk)²) = 1.160 Hz                                          #
# → R2_eff = 14.085 + 1.160 = 15.245 Hz → T2_eff ≈ 65.6 ms  (ΔT2 ≈ 5.4 ms)     #
####################################################################################

water_pool: {
  f: 1,
  t1: 2.5,
  t2: 0.071
}

cest_pool: {
 'amide': {
   f: 0.00064865,
   t1: 1.3,
   t2: 0.1,
   k: 2000,
   dw: 8
  }
}

b0: 17
gamma: 267.5153
b0_inhom: 3.0e-8
rel_b1: 1

verbose: False
reset_init_mag: True
scale: 1
max_pulse_samples: 200
